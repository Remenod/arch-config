#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = $HOME/.config/waybar/scripts/kbd_backlight.sh restore
exec-once = $HOME/.config/waybar/scripts/volume.sh sync-leds
exec-once = ydotoold
exec-once = waybar
exec-once = mako
exec-once = AyuGram -startintray
exec-once = kdeconnect-indicator
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE && systemctl --user restart xdg-desktop-portal-hyprland xdg-desktop-portal
exec-once = xwaylandvideobridge
