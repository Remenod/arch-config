###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, R, exec, $terminal
bind = $mainMod, K, exec, kitty
bind = ALT, F4, killactive,
bind = ALT, F24, killactive,
bind = ALT SUPER, F24, killactive
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
#bind = $mainMod, E, exec, $menu
bind = $mainMod, F, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, F11, fullscreenstate, 1
bind = $mainMod SHIFT, F11, fullscreenstate, 2

bind = , PRINT, exec, HYPRSHOT_DIR="$HOME/Pictures/Screenshots" $HOME/.local/bin/hyprshot-safe -m region --freeze
bind = $mainMod, PRINT, exec, HYPRSHOT_DIR="$HOME/Pictures/Screenshots" $HOME/.local/bin/hyprshot-safe -m output --freeze
bind = $mainMod+SHIFT, PRINT, exec, HYPRSHOT_DIR="$HOME/Pictures/Screenshots" $HOME/.local/bin/hyprshot-safe -m window --freeze

bind = ALT, left, exec, wtype -m alt -k Home
bind = ALT, right, exec, wtype -m alt -k End

bind = $mainMod+SHIFT, W, exec, pkill waybar; waybar
bind = $mainMod+SHIFT, Q, exec, pkill mako; mako
#bind = $mainMod+SHIFT, E, exec, pkill swaybg; swaybg -i $wallpaper -m fill

bind = CTRL+SHIFT, Escape, exec, alacritty -e btm --battery --network_use_bytes --enable_cache_memory --hide-k-threads --show_table_scroll_position --tree --free_arc

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

binde = $mainMod SHIFT, right, resizeactive, 30 0
binde = $mainMod SHIFT, left, resizeactive, -30 0
binde = $mainMod SHIFT, up, resizeactive, 0 -30
binde = $mainMod SHIFT, down, resizeactive, 0 30

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

binde = SUPER ALT, right, workspace, +1
binde = SUPER ALT, left, workspace, -1

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

binde = SUPER ALT SHIFT, right, movetoworkspace, +1
binde = SUPER ALT SHIFT, left, movetoworkspace, -1

# Switch workspaces with mainMod + CTRL + [0-9]
bind = $mainMod CTRL, 1, workspace, 11
bind = $mainMod CTRL, 2, workspace, 12
bind = $mainMod CTRL, 3, workspace, 13
bind = $mainMod CTRL, 4, workspace, 14
bind = $mainMod CTRL, 5, workspace, 15
bind = $mainMod CTRL, 6, workspace, 16
bind = $mainMod CTRL, 7, workspace, 17
bind = $mainMod CTRL, 8, workspace, 18
bind = $mainMod CTRL, 9, workspace, 19
bind = $mainMod CTRL, 0, workspace, 20

# Move active window to a workspace with mainMod + CTRL + SHIFT + [0-9]
bind = $mainMod CTRL SHIFT, 1, movetoworkspace, 11
bind = $mainMod CTRL SHIFT, 2, movetoworkspace, 12
bind = $mainMod CTRL SHIFT, 3, movetoworkspace, 13
bind = $mainMod CTRL SHIFT, 4, movetoworkspace, 14
bind = $mainMod CTRL SHIFT, 5, movetoworkspace, 15
bind = $mainMod CTRL SHIFT, 6, movetoworkspace, 16
bind = $mainMod CTRL SHIFT, 7, movetoworkspace, 17
bind = $mainMod CTRL SHIFT, 8, movetoworkspace, 18
bind = $mainMod CTRL SHIFT, 9, movetoworkspace, 19
bind = $mainMod CTRL SHIFT, 0, movetoworkspace, 20

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
#bind = $mainMod, mouse_down, workspace, e+1
#bind = $mainMod, mouse_up, workspace, e-1

bind = , mouse:275, sendshortcut, ALT, Left, activewindow
bind = , mouse:276, sendshortcut, ALT, Right, activewindow

# Move/resize windows with mainMod + LMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod+Shift, mouse:272, resizewindow

# Laptop multimedia keys for volume and LCD brightness
#bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioRaiseVolume, exec, sh -c 'wpctl set-mute @DEFAULT_AUDIO_SINK@ 0;/home/remenod/.config/waybar/scripts/volume.sh output raise 5'

#bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioLowerVolume, exec, /home/remenod/.config/waybar/scripts/volume.sh output lower 5

#bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = ,XF86AudioMute, exec, /home/remenod/.config/waybar/scripts/volume.sh output mute

#bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = ,XF86AudioMicMute, exec, /home/remenod/.config/waybar/scripts/volume.sh input mute

bindel = ,XF86MonBrightnessUp, exec, sh -c 'brightnessctl -e2 -n2 set 5%+ && level=$(brightnessctl -m | awk -F "," "{print \$4}") && notify-send "Brightness: $level" -h int:value:$level -i contrast -h string:x-canonical-private-synchronous:backlight'
bindel = ,XF86MonBrightnessDown, exec, sh -c 'brightnessctl -e2 -n2 set 5%- && level=$(brightnessctl -m | awk -F "," "{print \$4}") && notify-send "Brightness: $level" -h int:value:$level -i contrast -h string:x-canonical-private-synchronous:backlight'

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = CTRL SUPER, code:202, exec, /home/remenod/.config/hypr/scripts/toggle_touchpad.sh

bind = ALT, C, exec, kdeconnect-cli -n "Makscold" --send-clipboard
